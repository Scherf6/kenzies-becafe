<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Kenzie's Be Cafe — Barista Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --brown-deep:#2c1a0e;--brown-mid:#5c3d1e;--brown-light:#a06b3c;
    --brown-pale:#d4a97a;--cream:#faf7f2;--cream-dark:#f0ebe1;
    --gold:#c9913a;--gold-light:#e8c07a;--border:rgba(92,61,30,0.12);
    --text-dark:#1e1209;--text-mid:#5c3d1e;--text-light:#9a7a5a;
    --green:#2d8a4e;--green-light:#e6f4ec;--green-border:#a8d5b8;
    --warm-white:#fffdf9;--venmo:#008cff;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--cream-dark);color:var(--text-dark);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}

  /* ── LOGIN ── */
  .login-screen{position:fixed;inset:0;background:var(--brown-deep);display:flex;align-items:center;justify-content:center;z-index:999;padding:24px;}
  .login-box{background:rgba(255,255,255,0.06);border:1px solid rgba(201,145,58,0.3);border-radius:20px;padding:40px 36px;width:100%;max-width:380px;text-align:center;}
  .login-icon{font-size:40px;margin-bottom:16px;}
  .login-title{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--brown-pale);margin-bottom:8px;}
  .login-sub{font-size:20px;font-weight:600;color:var(--cream);margin-bottom:28px;}
  .login-input{width:100%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:12px;padding:14px 18px;font-size:18px;color:var(--cream);text-align:center;letter-spacing:4px;outline:none;font-family:'DM Mono',monospace;}
  .login-input:focus{border-color:var(--gold);}
  .login-btn{width:100%;background:var(--gold);color:var(--brown-deep);font-size:15px;font-weight:600;padding:14px;border-radius:12px;cursor:pointer;border:none;margin-top:14px;}
  .login-error{font-size:13px;color:#ff8a8a;margin-top:10px;min-height:18px;}

  /* ── TOP BAR ── */
  .top-bar{background:var(--brown-deep);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(0,0,0,0.2);}
  .top-bar-title{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--brown-pale);}
  .top-bar-right{display:flex;align-items:center;gap:12px;}
  .refresh-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:8px;color:var(--cream);font-size:12px;padding:6px 14px;cursor:pointer;font-family:'DM Mono',monospace;}
  .last-refresh{font-size:11px;color:rgba(255,255,255,0.3);font-family:'DM Mono',monospace;}

  /* ── STATS BAR ── */
  .stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border-bottom:1px solid var(--border);}
  .stat-cell{background:white;padding:14px 16px;text-align:center;}
  .stat-cell-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text-light);margin-bottom:4px;}
  .stat-cell-val{font-size:22px;font-weight:600;color:var(--brown-deep);font-family:'DM Mono',monospace;}
  .stat-cell-val.green{color:var(--green);}
  .stat-cell-val.gold{color:var(--gold);}

  /* ── TABS ── */
  .tabs{display:flex;background:white;border-bottom:1px solid var(--border);}
  .tab-btn{flex:1;padding:14px 8px;font-size:13px;font-weight:500;color:var(--text-light);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;}
  .tab-btn.active{color:var(--brown-deep);border-bottom-color:var(--gold);font-weight:600;}
  .tab-count{display:inline-block;background:var(--gold);color:var(--brown-deep);font-size:10px;font-weight:700;padding:1px 6px;border-radius:100px;margin-left:5px;}
  .tab-count.green{background:var(--green);color:white;}

  .tab-content{display:none;padding:16px;}
  .tab-content.active{display:block;}

  /* ── ORDER CARDS ── */
  .order-card{background:white;border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px;position:relative;}
  .order-card.picked-up{background:var(--green-light);border-color:var(--green-border);opacity:0.8;}
  .order-card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;}
  .order-name{font-size:16px;font-weight:600;color:var(--brown-deep);}
  .order-dept{font-size:12px;color:var(--text-light);margin-top:2px;}
  .order-time{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-light);}
  .order-drinks{font-size:13px;color:var(--text-mid);margin-bottom:10px;line-height:1.6;background:var(--cream-dark);border-radius:8px;padding:10px 12px;}
  .order-notes{font-size:12px;color:var(--text-light);font-style:italic;margin-bottom:10px;}
  .order-footer{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .order-total{font-family:'DM Mono',monospace;font-size:18px;font-weight:500;color:var(--brown-deep);}
  .pickup-btn{background:var(--green);color:white;border:none;border-radius:10px;padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer;flex-shrink:0;}
  .pickup-btn:disabled{opacity:0.5;cursor:not-allowed;}
  .picked-up-badge{background:var(--green);color:white;border-radius:10px;padding:8px 16px;font-size:12px;font-weight:600;font-family:'DM Mono',monospace;}
  .order-num{position:absolute;top:12px;right:12px;font-family:'DM Mono',monospace;font-size:10px;color:var(--text-light);}

  /* ── PAYMENT VERIFY MODAL ── */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
  .modal-overlay.open{display:flex;}
  .modal-box{background:white;border-radius:20px;padding:28px 24px;width:100%;max-width:360px;text-align:center;}
  .modal-icon{font-size:44px;margin-bottom:12px;}
  .modal-title{font-size:20px;font-weight:600;color:var(--brown-deep);margin-bottom:6px;}
  .modal-name{font-family:'DM Mono',monospace;font-size:14px;color:var(--brown-light);margin-bottom:4px;}
  .modal-total{font-family:'Cormorant Garamond',Georgia,serif;font-size:36px;font-weight:700;color:var(--brown-deep);margin-bottom:20px;}
  .modal-pay-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
  .modal-pay-btn{padding:14px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all 0.15s;}
  .modal-pay-btn.venmo{background:var(--venmo);color:white;}
  .modal-pay-btn.cash{background:var(--green);color:white;}
  .modal-pay-btn.selected{outline:3px solid var(--brown-deep);outline-offset:2px;}
  .modal-confirm-btn{width:100%;background:var(--brown-deep);color:var(--cream);font-size:15px;font-weight:600;padding:14px;border-radius:12px;cursor:pointer;border:none;}
  .modal-cancel{display:block;margin-top:12px;font-size:13px;color:var(--text-light);cursor:pointer;text-decoration:underline;background:none;border:none;width:100%;}

  /* ── WALK-UP FORM ── */
  .walkup-wrap{max-width:600px;margin:0 auto;}
  .wu-section{background:white;border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:12px;}
  .wu-section-title{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--brown-light);margin-bottom:14px;}
  .drink-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}

  /* ── Drink tile with per-drink milk ── */
  .drink-tile{background:var(--cream-dark);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:border-color 0.15s;}
  .drink-tile.selected{border-color:var(--gold);background:#fdf3e3;}
  .drink-tile-header{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;cursor:pointer;}
  .drink-tile-left{flex:1;}
  .drink-tile-name{font-size:13px;font-weight:500;color:var(--text-dark);}
  .drink-tile-price{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-light);}
  .drink-tile-qty-wrap{display:none;align-items:center;gap:6px;}
  .drink-tile.selected .drink-tile-qty-wrap{display:flex;}
  .dqb{width:26px;height:26px;border-radius:50%;border:1px solid var(--border);background:white;color:var(--brown-mid);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .dqv{font-family:'DM Mono',monospace;font-size:13px;min-width:18px;text-align:center;}
  /* Per-drink milk pills inside tile */
  .tile-milk-row{display:none;flex-wrap:wrap;gap:4px;padding:0 10px 10px;}
  .drink-tile.selected .tile-milk-row{display:flex;}
  .tile-milk-pill{padding:4px 10px;border-radius:100px;border:1px solid var(--border);background:white;font-size:11px;color:var(--text-mid);cursor:pointer;transition:all 0.12s;white-space:nowrap;}
  .tile-milk-pill.selected{background:var(--brown-deep);color:var(--cream);border-color:var(--brown-deep);}
  .tile-milk-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--text-light);padding:0 10px 6px;display:none;width:100%;}
  .drink-tile.selected .tile-milk-label{display:block;}

  .donate-row{display:flex;gap:8px;flex-wrap:wrap;}
  .donate-tap{padding:10px 18px;border-radius:10px;border:1px solid var(--border);background:var(--cream-dark);font-size:15px;font-weight:600;color:var(--brown-mid);cursor:pointer;transition:all 0.15s;}
  .donate-tap.selected{background:var(--brown-deep);color:var(--gold-light);border-color:var(--brown-deep);}
  .wu-field{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;}
  .wu-field label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--brown-light);}
  .wu-field input{border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:15px;color:var(--text-dark);background:var(--cream);outline:none;transition:border-color 0.15s;width:100%;}
  .wu-field input:focus{border-color:var(--gold);}
  .wu-summary{background:var(--cream-dark);border-radius:10px;padding:14px 16px;margin-bottom:12px;border:1px solid var(--border);}
  .wu-summary-items{font-size:13px;color:var(--text-mid);line-height:1.8;}
  .wu-summary-total{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
  .wu-total-label{font-size:13px;color:var(--text-light);}
  .wu-total-amt{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;color:var(--brown-deep);}
  .wu-pay-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
  .wu-pay-btn{padding:14px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;border:none;text-align:center;}
  .wu-pay-btn.venmo{background:var(--venmo);color:white;}
  .wu-pay-btn.cash{background:var(--green);color:white;}
  .wu-charge-btn{width:100%;background:var(--brown-deep);color:var(--cream);font-size:16px;font-weight:600;padding:16px;border-radius:12px;cursor:pointer;border:none;}
  .wu-charge-btn:disabled{opacity:0.5;cursor:not-allowed;}
  .wu-success{background:var(--green-light);border:1px solid var(--green-border);border-radius:12px;padding:20px;text-align:center;display:none;}
  .wu-success-icon{font-size:36px;display:block;margin-bottom:8px;}
  .wu-success-text{font-size:16px;font-weight:600;color:var(--green);margin-bottom:4px;}
  .wu-success-sub{font-size:13px;color:var(--text-light);}
  .wu-next-btn{margin-top:12px;background:var(--brown-deep);color:var(--cream);border:none;border-radius:10px;padding:12px 28px;font-size:14px;font-weight:600;cursor:pointer;}

  .empty-state{text-align:center;padding:60px 20px;color:var(--text-light);}
  .empty-icon{font-size:40px;display:block;margin-bottom:12px;}
  .loading{text-align:center;padding:40px;color:var(--text-light);font-family:'DM Mono',monospace;font-size:12px;}

  @media(min-width:768px){
    .drink-grid{grid-template-columns:repeat(3,1fr);}
    .tab-content{padding:20px;}
    .walkup-wrap{max-width:700px;}
  }
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div class="login-screen" id="login-screen">
  <div class="login-box">
    <div class="login-icon">☕</div>
    <div class="login-title">Kenzie's Be Cafe</div>
    <div class="login-sub">Barista Dashboard</div>
    <input class="login-input" type="password" id="login-input" placeholder="••••••" maxlength="20" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Enter</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ── PAYMENT VERIFY MODAL ── -->
<div class="modal-overlay" id="payment-modal">
  <div class="modal-box">
    <div class="modal-icon">💳</div>
    <div class="modal-title">Confirm Payment</div>
    <div class="modal-name" id="modal-name">–</div>
    <div class="modal-total" id="modal-total">$0.00</div>
    <div class="modal-pay-btns">
      <button class="modal-pay-btn venmo selected" id="modal-venmo" onclick="selectModalPayment('Venmo')">💙 Venmo</button>
      <button class="modal-pay-btn cash" id="modal-cash" onclick="selectModalPayment('Cash')">💵 Cash</button>
    </div>
    <button class="modal-confirm-btn" id="modal-confirm-btn" onclick="confirmPickup()">✅ &nbsp;Payment Received — Mark Picked Up</button>
    <button class="modal-cancel" onclick="closeModal()">Cancel</button>
  </div>
</div>

<!-- ── APP ── -->
<div id="app" style="display:none;">
  <div class="top-bar">
    <div class="top-bar-title">☕ Barista Dashboard — April 16th</div>
    <div class="top-bar-right">
      <span class="last-refresh" id="last-refresh">–</span>
      <button class="refresh-btn" onclick="loadAll()">↻ Refresh</button>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat-cell"><div class="stat-cell-label">Pre-Orders</div><div class="stat-cell-val" id="stat-total">–</div></div>
    <div class="stat-cell"><div class="stat-cell-label">Pending</div><div class="stat-cell-val gold" id="stat-pending">–</div></div>
    <div class="stat-cell"><div class="stat-cell-label">Picked Up</div><div class="stat-cell-val green" id="stat-done">–</div></div>
    <div class="stat-cell"><div class="stat-cell-label">Total Raised</div><div class="stat-cell-val" id="stat-raised">–</div></div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('preorders',this)">Pre-Orders <span class="tab-count" id="pending-count">0</span></button>
    <button class="tab-btn" onclick="switchTab('walkup',this)">+ Walk-Up</button>
    <button class="tab-btn" onclick="switchTab('done',this)">Done <span class="tab-count green" id="done-count">0</span></button>
  </div>

  <div class="tab-content active" id="tab-preorders">
    <div id="preorders-list"><div class="loading">Loading orders...</div></div>
  </div>

  <div class="tab-content" id="tab-walkup">
    <div class="walkup-wrap">
      <div class="wu-section">
        <div class="wu-section-title">Hot Drinks ☕</div>
        <div class="drink-grid" id="wu-hot-grid"></div>
      </div>
      <div class="wu-section">
        <div class="wu-section-title">Iced Drinks 🧊</div>
        <div class="drink-grid" id="wu-iced-grid"></div>
      </div>
      <div class="wu-section">
        <div class="wu-section-title">Donation 🤍</div>
        <div class="donate-row">
          <button class="donate-tap selected" onclick="selectWuDonate(this,0)">None</button>
          <button class="donate-tap" onclick="selectWuDonate(this,5)">$5</button>
          <button class="donate-tap" onclick="selectWuDonate(this,10)">$10</button>
          <button class="donate-tap" onclick="selectWuDonate(this,25)">$25</button>
        </div>
      </div>
      <div class="wu-section">
        <div class="wu-section-title">Customer (optional)</div>
        <div class="wu-field"><label>Name</label><input type="text" id="wu-name" placeholder="Walk-up customer"></div>
      </div>
      <div class="wu-summary">
        <div class="wu-summary-items" id="wu-summary-items"><span style="color:rgba(92,61,30,0.3);font-style:italic;">Nothing selected yet</span></div>
        <div class="wu-summary-total">
          <span class="wu-total-label">Total</span>
          <span class="wu-total-amt" id="wu-total">$0.00</span>
        </div>
      </div>
      <div class="wu-section" style="padding:14px 18px;">
        <div class="wu-section-title">Payment</div>
        <div class="wu-pay-btns">
          <button class="wu-pay-btn venmo" id="wu-pay-venmo" onclick="selectWuPayment('Venmo')">💙 Venmo</button>
          <button class="wu-pay-btn cash" id="wu-pay-cash" onclick="selectWuPayment('Cash')">💵 Cash</button>
        </div>
      </div>
      <button class="wu-charge-btn" id="wu-charge-btn" onclick="submitWalkup()">✅ &nbsp;Charge & Log Order</button>
      <br><br>
      <div class="wu-success" id="wu-success">
        <span class="wu-success-icon">✅</span>
        <div class="wu-success-text">Order logged!</div>
        <div class="wu-success-sub" id="wu-success-sub"></div>
        <button class="wu-next-btn" onclick="resetWalkup()">Next Customer →</button>
      </div>
    </div>
  </div>

  <div class="tab-content" id="tab-done">
    <div id="done-list"><div class="loading">Loading...</div></div>
  </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwg1TpmFmXnjGcA9w9Nobpna5nO78poj38QzbTXRqM0rmeFRRkCL6ZItbA6CQqvDvGx/exec";
const PASSWORD = "kenzies2026";
const HOT = [
  {name:"Hot Chocolate",price:4.50},{name:"Americano",price:2.75},
  {name:"Chai",price:5.00},{name:"Dirty Chai",price:5.50},
  {name:"Latte",price:4.50},{name:"Mocha Latte",price:5.25},
  {name:"Caramel Latte",price:5.25},{name:"Vanilla Latte",price:5.25},
  {name:"SF Vanilla Latte",price:5.25},{name:"Butter Pecan",price:5.25},
  {name:"Bourbon Caramel",price:5.50},
];
const ICED = [
  {name:"Iced Americano",price:2.75},{name:"Iced Chai",price:5.00},
  {name:"Iced Dirty Chai",price:5.50},{name:"Iced Latte",price:4.50},
  {name:"Iced Mocha",price:5.25},{name:"Iced Caramel",price:5.25},
  {name:"Iced Vanilla",price:5.25},{name:"Iced SF Vanilla",price:5.25},
  {name:"Iced Butter Pecan",price:5.25},{name:"Iced Bourbon Car.",price:5.50},
];
const MILKS = ['Regular','Almond +$1.25','Oat +$1.25','Coconut +$1.25'];

// ── LOGIN ──────────────────────────────────────────────────────────────────
function doLogin(){
  if(document.getElementById('login-input').value===PASSWORD){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='block';
    loadAll(); setInterval(loadAll,30000);
  } else {
    document.getElementById('login-error').textContent='Incorrect password.';
    document.getElementById('login-input').value='';
  }
}

// ── ORDERS DATA ────────────────────────────────────────────────────────────
let allOrders=[], pendingPickupRow=null, pendingPickupPayment='Venmo';

async function loadAll(){
  try{
    const r=await fetch(SCRIPT_URL+'?action=getorders');
    const data=await r.json();
    allOrders=data.orders||[];
    renderOrders(); updateStats();
    document.getElementById('last-refresh').textContent=new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  }catch(e){}
  loadThermo();
}

async function loadThermo(){
  try{
    const r=await fetch(SCRIPT_URL+'?action=totals');
    const d=await r.json();
    document.getElementById('stat-raised').textContent='$'+(parseFloat(d.total)||0).toFixed(0);
  }catch(e){}
}

function renderOrders(){
  const pending=allOrders.filter(o=>o.paid!=='Yes');
  const done=allOrders.filter(o=>o.paid==='Yes');
  document.getElementById('pending-count').textContent=pending.length;
  document.getElementById('done-count').textContent=done.length;
  document.getElementById('preorders-list').innerHTML=pending.length
    ?pending.map(o=>orderCard(o,false)).join('')
    :'<div class="empty-state"><span class="empty-icon">✅</span>All orders picked up!</div>';
  document.getElementById('done-list').innerHTML=done.length
    ?done.map(o=>orderCard(o,true)).join('')
    :'<div class="empty-state"><span class="empty-icon">☕</span>No pickups yet</div>';
}

function updateStats(){
  const pending=allOrders.filter(o=>o.paid!=='Yes').length;
  const done=allOrders.filter(o=>o.paid==='Yes').length;
  document.getElementById('stat-total').textContent=allOrders.length;
  document.getElementById('stat-pending').textContent=pending;
  document.getElementById('stat-done').textContent=done;
}

function orderCard(order, isDone){
  const time=order.timestamp?new Date(order.timestamp).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}):'';
  return`<div class="order-card ${isDone?'picked-up':''}" id="order-${order.row}">
    <div class="order-num">#${order.row}</div>
    <div class="order-card-header">
      <div><div class="order-name">${order.name||'Walk-up'}</div><div class="order-dept">${order.dept||''}</div></div>
      <div class="order-time">${time}</div>
    </div>
    <div class="order-drinks">${(order.drinks||'').replace(/,\s*/g,'<br>')}</div>
    ${order.notes?`<div class="order-notes">📝 ${order.notes}</div>`:''}
    <div class="order-footer">
      <div class="order-total">$${parseFloat(order.total||0).toFixed(2)}</div>
      ${isDone
        ?`<div class="picked-up-badge">✅ Picked Up · ${order.paymentMethod||''}</div>`
        :`<button class="pickup-btn" onclick="openPickupModal(${order.row},'${(order.name||'').replace(/'/g,"\\'")}',${order.total||0})">Picked Up & Paid ✅</button>`
      }
    </div>
  </div>`;
}

// ── PAYMENT MODAL ──────────────────────────────────────────────────────────
function openPickupModal(row, name, total){
  pendingPickupRow=row; pendingPickupPayment='Venmo';
  document.getElementById('modal-name').textContent=name||'Walk-up';
  document.getElementById('modal-total').textContent='$'+parseFloat(total).toFixed(2);
  selectModalPayment('Venmo');
  document.getElementById('payment-modal').classList.add('open');
}

function selectModalPayment(method){
  pendingPickupPayment=method;
  document.getElementById('modal-venmo').style.outline=method==='Venmo'?'3px solid var(--brown-deep)':'none';
  document.getElementById('modal-cash').style.outline=method==='Cash'?'3px solid var(--brown-deep)':'none';
}

function closeModal(){
  document.getElementById('payment-modal').classList.remove('open');
  pendingPickupRow=null;
}

async function confirmPickup(){
  if(!pendingPickupRow) return;
  const btn=document.getElementById('modal-confirm-btn');
  btn.disabled=true; btn.textContent='Saving...';
  try{
    const url=`${SCRIPT_URL}?action=pickup&row=${pendingPickupRow}&payment=${encodeURIComponent(pendingPickupPayment)}`;
    await fetch(url,{method:'GET',mode:'no-cors'});
    const order=allOrders.find(o=>o.row===pendingPickupRow);
    if(order){order.paid='Yes';order.paymentMethod=pendingPickupPayment;}
    renderOrders(); updateStats();
    closeModal();
    setTimeout(loadAll,1500);
  }catch(e){}
  btn.disabled=false;
  btn.textContent='✅  Payment Received — Mark Picked Up';
}

// ── WALK-UP FORM ───────────────────────────────────────────────────────────
let wuCart={}, wuDonate=0, wuPayment='Venmo';

function buildWuMenus(){
  buildWuGrid(HOT,'wu-hot-grid');
  buildWuGrid(ICED,'wu-iced-grid');
}

function buildWuGrid(items, id){
  const el=document.getElementById(id);
  items.forEach(item=>{
    const sid=item.name.replace(/\s+/g,'-');
    const div=document.createElement('div');
    div.className='drink-tile'; div.id='wutile-'+sid;
    // Milk pills
    const milkPills=MILKS.map((m,i)=>
      `<button class="tile-milk-pill${i===0?' selected':''}" onclick="selectWuDrinkMilk('${item.name}','${m}',this)">${m.replace(' +$1.25','')}</button>`
    ).join('');
    div.innerHTML=`
      <div class="drink-tile-header" onclick="toggleWuDrink('${item.name}',${item.price})">
        <div class="drink-tile-left">
          <div class="drink-tile-name">${item.name}</div>
          <div class="drink-tile-price">$${item.price.toFixed(2)}</div>
        </div>
        <div class="drink-tile-qty-wrap">
          <button class="dqb" onclick="event.stopPropagation();changeWuQty('${item.name}',${item.price},-1)">−</button>
          <span class="dqv" id="wuqty-${sid}">1</span>
          <button class="dqb" onclick="event.stopPropagation();changeWuQty('${item.name}',${item.price},1)">+</button>
        </div>
      </div>
      <div class="tile-milk-label">Milk</div>
      <div class="tile-milk-row">${milkPills}</div>`;
    el.appendChild(div);
  });
}

function toggleWuDrink(name, price){
  const sid=name.replace(/\s+/g,'-');
  const tile=document.getElementById('wutile-'+sid);
  if(wuCart[name]){
    wuCart[name].qty++;
    document.getElementById('wuqty-'+sid).textContent=wuCart[name].qty;
  } else {
    wuCart[name]={qty:1,price,milk:'Regular'};
    tile.classList.add('selected');
    document.getElementById('wuqty-'+sid).textContent=1;
  }
  updateWuSummary();
}

function changeWuQty(name,price,delta){
  if(!wuCart[name])return;
  wuCart[name].qty=Math.max(1,wuCart[name].qty+delta);
  document.getElementById('wuqty-'+name.replace(/\s+/g,'-')).textContent=wuCart[name].qty;
  updateWuSummary();
}

function selectWuDrinkMilk(name, milk, btn){
  if(!wuCart[name])return;
  wuCart[name].milk=milk;
  const tile=document.getElementById('wutile-'+name.replace(/\s+/g,'-'));
  tile.querySelectorAll('.tile-milk-pill').forEach(p=>p.classList.remove('selected'));
  btn.classList.add('selected');
  updateWuSummary();
}

function selectWuDonate(btn,amt){
  document.querySelectorAll('.donate-tap').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected'); wuDonate=amt; updateWuSummary();
}

function selectWuPayment(method){
  wuPayment=method;
  document.getElementById('wu-pay-venmo').style.outline=method==='Venmo'?'3px solid var(--brown-deep)':'none';
  document.getElementById('wu-pay-cash').style.outline=method==='Cash'?'3px solid var(--brown-deep)':'none';
}

function wuCalcTotal(){
  let t=Object.values(wuCart).reduce((s,{qty,price,milk})=>{
    return s+qty*price+(milk&&milk!=='Regular'?qty*1.25:0);
  },0);
  if(wuDonate>0)t+=wuDonate;
  return t;
}

function updateWuSummary(){
  const el=document.getElementById('wu-summary-items');
  let lines=[];
  Object.entries(wuCart).forEach(([name,{qty,price,milk}])=>{
    const milkNote=milk&&milk!=='Regular'?` · ${milk.replace(' +$1.25','')} milk`:'';
    const lineTotal=qty*price+(milk&&milk!=='Regular'?qty*1.25:0);
    lines.push(`${qty}× ${name}${milkNote} — $${lineTotal.toFixed(2)}`);
  });
  if(wuDonate>0)lines.push(`Donation — $${wuDonate.toFixed(2)}`);
  el.innerHTML=lines.length?lines.map(l=>`<div>${l}</div>`).join(''):'<span style="color:rgba(92,61,30,0.3);font-style:italic;">Nothing selected yet</span>';
  document.getElementById('wu-total').textContent='$'+wuCalcTotal().toFixed(2);
}

async function submitWalkup(){
  if(Object.keys(wuCart).length===0&&wuDonate===0){alert('Select at least one drink or donation.');return;}
  const btn=document.getElementById('wu-charge-btn');
  btn.disabled=true; btn.textContent='Logging...';
  const name=document.getElementById('wu-name').value.trim()||'Walk-up';
  const drinks=Object.entries(wuCart).map(([n,{qty,price,milk}])=>{
    const milkNote=milk&&milk!=='Regular'?` (${milk.replace(' +$1.25','')} milk)`:'';
    return`${qty}x ${n}${milkNote} ($${(qty*price+(milk&&milk!=='Regular'?qty*1.25:0)).toFixed(2)})`;
  }).join(', ');
  const total=wuCalcTotal();
  try{
    const url=`${SCRIPT_URL}?action=walkup&name=${encodeURIComponent(name)}&drink=${encodeURIComponent(drinks)}&milk=see+order&donation=${wuDonate.toFixed(2)}&total=${total.toFixed(2)}&payment=${encodeURIComponent(wuPayment)}`;
    await fetch(url,{method:'GET',mode:'no-cors'});
  }catch(e){}
  document.getElementById('wu-success-sub').textContent=`${name} — $${total.toFixed(2)} via ${wuPayment}`;
  document.getElementById('wu-success').style.display='block';
  btn.style.display='none';
  setTimeout(loadAll,1500);
}

function resetWalkup(){
  wuCart={}; wuDonate=0; wuPayment='Venmo';
  document.querySelectorAll('.drink-tile').forEach(t=>t.classList.remove('selected'));
  document.querySelectorAll('.dqv').forEach(v=>v.textContent='1');
  document.querySelectorAll('.tile-milk-pill').forEach(p=>p.classList.remove('selected'));
  document.querySelectorAll('.tile-milk-row .tile-milk-pill:first-child').forEach(p=>p.classList.add('selected'));
  document.querySelectorAll('.donate-tap').forEach(b=>b.classList.remove('selected'));
  document.querySelector('.donate-tap').classList.add('selected');
  document.getElementById('wu-name').value='';
  selectWuPayment('Venmo');
  updateWuSummary();
  document.getElementById('wu-success').style.display='none';
  document.getElementById('wu-charge-btn').style.display='block';
  document.getElementById('wu-charge-btn').disabled=false;
  document.getElementById('wu-charge-btn').textContent='✅  Charge & Log Order';
}

function switchTab(name,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
}

// ── INIT ───────────────────────────────────────────────────────────────────
buildWuMenus();
selectWuPayment('Venmo');
</script>
</body>
</html>
